<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Bar Timer</title>
  <!-- SEO & Description -->
  <meta name="description" content="キングジム「ビジュアルバータイマー」をベースに開発された、Web＆デスクトップ対応の直感的な時間管理タイマー。ポモドーロ対応。">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <script type="module" crossorigin src="./assets/index-DJ08RSbs.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DyO6WGPw.css">
</head>
<body class="app-body theme-dark">

  <!-- Desktop Frameless Window Titlebar (Only active in Neutralino) -->
  <header id="custom-titlebar" class="titlebar draggable">
    <div class="titlebar-logo">
      <span class="logo-icon">⏳</span>
      <span class="logo-text">Work Bar Timer</span>
    </div>
    <div id="titlebar-controls" class="titlebar-controls no-drag">
      <button id="btn-pin" title="常に最前面表示を切り替え" class="control-btn pin-active">
        <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M16,12V4H17V2H7V4H8V12L6,14V16H11.2V22H12.8V16H18V14L16,12M8.8,14L10,12.8V4H14V12.8L15.2,14H8.8Z"/></svg>
      </button>
      <button id="btn-minimize" title="最小化" class="control-btn">
        <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M20,14H4V10H20V14Z"/></svg>
      </button>
      <button id="btn-close" title="閉じる" class="control-btn close-btn">
        <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
      </button>
    </div>
  </header>

  <!-- Flash Notification Screen Overlay (Timeup Visual Alert) -->
  <div id="flash-overlay" class="flash-overlay hidden"></div>

  <!-- Main Container -->
  <main class="main-container">
    
    <!-- 20 Segment Bar Display -->
    <section class="bar-container">
      <div id="bar-display" class="bar-display" title="ホイールスクロールで時間調整">
        <!-- 20 segments dynamically generated by JavaScript -->
        <!-- Fallback for rendering template -->
        <div class="segment-track-fallback">
          <div class="fallback-segment"></div>
        </div>
      </div>
    </section>

    <!-- Mid Panel: Clock, Status, Mode Selector -->
    <section class="dashboard-panel">
      <!-- Digital Display & Status -->
      <div class="timer-display-group">
        <div class="status-indicator-bar">
          <span id="badge-mode" class="status-badge">COUNTDOWN</span>
          <span id="badge-cycle" class="status-badge hidden">CYCLE 1/4</span>
          <span id="badge-phase" class="status-badge hidden">WORK</span>
        </div>
        <div id="digital-clock" class="digital-clock" title="ホイールスクロールで時間調整">05:00</div>
        <!-- Time Adjusters (Incremental) -->
        <div class="time-adjusters-group">
          <button class="adjust-btn" data-adjust="-600">-10分</button>
          <button class="adjust-btn" data-adjust="-60">-1分</button>
          <button class="adjust-btn" data-adjust="-10">-10秒</button>
          <button class="adjust-btn" data-adjust="10">+10秒</button>
          <button class="adjust-btn" data-adjust="60">+1分</button>
          <button class="adjust-btn" data-adjust="600">+10分</button>
        </div>
      </div>

      <!-- Mode Selector (Segmented Control) -->
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="COUNT_DOWN">COUNT DOWN</button>
        <button class="mode-btn" data-mode="COUNT_UP">COUNT UP</button>
        <button class="mode-btn" data-mode="REPEAT">POMODORO</button>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button id="btn-start-pause" class="action-btn start-btn" title="スペースキーでも動作">
          <span class="btn-icon">▶</span> <span class="btn-text">スタート</span>
        </button>
        <button id="btn-reset" class="action-btn reset-btn" title="Escキーでも動作">
          <span class="btn-icon">↺</span> <span class="btn-text">リセット</span>
        </button>
        <button id="btn-settings" class="action-btn settings-btn" title="設定を開く">
          <span class="btn-icon">⚙</span>
        </button>
        <button id="btn-fullscreen" class="action-btn fullscreen-btn browser-only" title="全画面表示">
          <span class="btn-icon">⛶</span>
        </button>
      </div>
    </section>
  </main>

  <!-- Settings Modal Dialog -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>タイマー設定</h3>
        <button id="modal-close" class="modal-close-x">&times;</button>
      </div>
      <div class="modal-body">
        
        <!-- Countdown Settings -->
        <div id="group-countdown" class="settings-group mode-settings-group">
          <label>タイマー時間</label>
          <div class="duration-inputs">
            <div class="input-unit">
              <input type="number" id="input-cd-mins" min="0" max="199" value="5">
              <span>分</span>
            </div>
            <div class="input-unit">
              <input type="number" id="input-cd-secs" min="0" max="50" step="10" value="0">
              <span>秒</span>
            </div>
          </div>
        </div>

        <!-- Pomodoro Repeat Settings -->
        <div id="group-pomodoro" class="settings-group mode-settings-group hidden">
          <div class="pomodoro-inputs">
            <div class="sub-input-group">
              <label>作業時間</label>
              <div class="duration-inputs">
                <div class="input-unit">
                  <input type="number" id="input-repeat-work" min="0" max="199" value="25">
                  <span>分</span>
                </div>
                <div class="input-unit">
                  <input type="number" id="input-repeat-work-secs" min="0" max="59" value="0">
                  <span>秒</span>
                </div>
              </div>
            </div>
            <div class="sub-input-group">
              <label>休憩時間</label>
              <div class="duration-inputs">
                <div class="input-unit">
                  <input type="number" id="input-repeat-break" min="0" max="199" value="5">
                  <span>分</span>
                </div>
                <div class="input-unit">
                  <input type="number" id="input-repeat-break-secs" min="0" max="59" value="0">
                  <span>秒</span>
                </div>
              </div>
            </div>
            <div class="sub-input-group">
              <label for="input-repeat-cycles">繰り返し回数 (回)</label>
              <input type="number" id="input-repeat-cycles" min="1" max="99" value="4">
            </div>
          </div>
        </div>

        <!-- Global Preferences -->
        <div class="settings-group preferences-group">
          <h4>機能設定</h4>
          
          <label class="checkbox-container">
            <input type="checkbox" id="pref-mute">
            <span class="checkmark"></span>
            操作音を消音 (ダイヤル・開始/停止の電子音)
          </label>

          <label class="checkbox-container">
            <input type="checkbox" id="pref-flash" checked>
            <span class="checkmark"></span>
            タイムアップ時に画面フラッシュ通知を表示
          </label>

          <label class="checkbox-container">
            <input type="checkbox" id="pref-notification" checked>
            <span class="checkmark"></span>
            OS標準のデスクトップ通知を許可
          </label>

          <label class="checkbox-container browser-only">
            <input type="checkbox" id="pref-wakelock">
            <span class="checkmark"></span>
            画面スリープを防止する (Wake Lock)
          </label>
        </div>

        <!-- Save button inside modal body (no dedicated footer bar) -->
        <div class="save-button-row">
          <button id="btn-save-settings" class="modal-btn save-btn">設定を適用</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Audio elements fallback (Using Web Audio API predominantly, but useful if needed) -->
  <audio id="audio-tick-hidden" src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" preload="auto"></audio>

<!-- Neutralino Client SDK Loader -->
  <script src="neutralino.js" defer></script>
  
  <!-- JavaScript Bundle (Vite entry point) -->
</body>
</html>
